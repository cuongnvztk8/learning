<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Learning Scenario UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="bg-gray-100">

<script>
const data = {
  header_info: {
    platform: "2nd Community",
    title: "音楽教本 ぴあのどりーむ1",
    subtitle: "概要",
    description: "この文章はダミーです。文字の大きさ、量、字間、行間等を確認するために入れています。",
    book_info: {
      series: "Arts & Design",
      brand: "EYS-Kids ArtsDesign",
      target_age: "3〜5",
      publish_date: "2021/01/01",
      rating: 5.0,
      review_score: 4.8
    }
  },
  main_table_data: [/* SAME DATA AS PROVIDED */],
  popup_content: {
    title: "くるみわりをえんそうしよう",
    instructor: "鈴木 太郎",
    date: "2022.07.13",
    description: "この演奏はリズム、強弱、テンポを意識して演奏します。",
    media: { image: true, video: true }
  }
};
</script>

<div id="app" class="max-w-5xl mx-auto p-6"></div>

<script>
const app = document.getElementById("app");

// HEADER
const header = `
  <div class="bg-[#4A5568] text-white p-4 rounded-lg mb-6">
    <div class="text-sm">${data.header_info.platform}</div>
    <h1 class="text-xl font-bold">${data.header_info.title}</h1>
  </div>

  <div class="bg-white rounded-lg p-6 mb-6 shadow">
    <h2 class="text-blue-500 font-semibold mb-2">${data.header_info.subtitle}</h2>
    <p class="text-gray-600 mb-4">${data.header_info.description}</p>

    <div class="grid grid-cols-2 gap-4 text-sm">
      <div>シリーズ: ${data.header_info.book_info.series}</div>
      <div>ブランド: ${data.header_info.book_info.brand}</div>
      <div>対象年齢: ${data.header_info.book_info.target_age}</div>
      <div>出版日: ${data.header_info.book_info.publish_date}</div>
      <div>評価: ⭐ ${data.header_info.book_info.rating}</div>
      <div>レビュー: ${data.header_info.book_info.review_score}</div>
    </div>
  </div>
`;

// TABLE
let tableRows = "";
data.main_table_data.forEach(row => {
  tableRows += `
    <div class="grid grid-cols-5 items-center text-sm border-b relative"
         style="background:${row.background_color}">
      <div class="p-2">${row.id}</div>
      <div class="p-2">${row.time_index}</div>
      <div class="p-2">${row.title}</div>
      <div class="p-2">
        ${row.status === 'completed' ? '✅' : row.status === 'active' ? '🟡' : '⬜'}
      </div>
      <div class="p-2">
        ${row.has_video_icon ? '▶️' : ''}
      </div>
    </div>
  `;
});

const table = `
  <div class="bg-white rounded-lg shadow overflow-hidden relative">
    <div class="grid grid-cols-5 bg-gray-200 text-sm font-semibold">
      <div class="p-2">ID</div>
      <div class="p-2">Time</div>
      <div class="p-2">Title</div>
      <div class="p-2">Status</div>
      <div class="p-2">Video</div>
    </div>
    ${tableRows}

    ${renderPopup()}
  </div>
`;

// POPUP (attached to active highlighted row)
function renderPopup() {
  const activeRow = data.main_table_data.find(r => r.is_highlighted);
  if (!activeRow) return "";

  const index = data.main_table_data.indexOf(activeRow);

  return `
    <div class="absolute left-1/2 -translate-x-1/2 w-80 bg-white shadow-xl rounded-lg p-4 border"
         style="top:${(index + 1) * 48}px">
      <div class="flex justify-between items-center mb-2">
        <h3 class="font-semibold text-blue-500">${data.popup_content.title}</h3>
        <span class="text-gray-400 cursor-pointer">✕</span>
      </div>
      <div class="text-sm text-gray-600 mb-2">
        👤 ${data.popup_content.instructor}
      </div>
      <div class="text-xs text-gray-400 mb-2">
        ${data.popup_content.date}
      </div>
      <p class="text-sm mb-3">${data.popup_content.description}</p>

      ${data.popup_content.media.image ? `
        <div class="bg-gray-200 h-24 mb-2 rounded"></div>
      ` : ''}

      ${data.popup_content.media.video ? `
        <div class="bg-gray-300 h-24 flex items-center justify-center rounded">
          ▶
        </div>
      ` : ''}
    </div>
  `;
}

// RENDER
app.innerHTML = header + table;
</script>

</body>
</html>
